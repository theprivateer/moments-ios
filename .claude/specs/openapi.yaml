openapi: 3.1.0

info:
  title: Moments API
  version: '1'

servers:
  - url: '{serverUrl}'
    variables:
      serverUrl:
        default: https://moments.test
        description: Base URL of the Moments instance

security:
  - bearerAuth: []

tags:
  - name: images
    description: Image upload
  - name: moments
    description: Moments

paths:
  /api/v1/images:
    post:
      summary: Upload an image
      tags: [images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file to upload (JPEG, PNG, GIF, etc.)
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentImageResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/moments:
    get:
      summary: List moments (timeline)
      tags: [moments]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (20 moments per page, newest first).
      responses:
        '200':
          description: Paginated list of moments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentListResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a moment
      tags: [moments]
      requestBody:
        required: true
        description: |
          At least one of `body` or `images` must be supplied.
          When no images are provided, `body` is required.
          When no body is provided, at least one image ID is required.
          Image IDs are obtained by first uploading via `POST /api/v1/images`.
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  maxLength: 10000
                  description: Markdown text. Required when no images are supplied.
                images:
                  type: array
                  items:
                    type: integer
                  description: IDs of pre-uploaded images (from POST /api/v1/images). Required when no body is supplied.
      responses:
        '201':
          description: Moment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/moments/{moment}:
    patch:
      summary: Update a moment
      tags: [moments]
      parameters:
        - name: moment
          in: path
          required: true
          schema:
            type: integer
          description: ID of the moment to update
      requestBody:
        required: true
        description: |
          All fields are optional (PATCH semantics). At least one of `body` or images must
          remain after the update — if removing all images, `body` must be supplied.
          Use `add_images` for IDs obtained from `POST /api/v1/images`.
          Use `remove_images` for IDs of images currently attached to this moment.
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  maxLength: 10000
                  nullable: true
                  description: Markdown text. Required when no images would remain after the update.
                add_images:
                  type: array
                  items:
                    type: integer
                  description: IDs of pre-uploaded images to attach (from POST /api/v1/images).
                remove_images:
                  type: array
                  items:
                    type: integer
                  description: IDs of existing images to remove from this moment.
      responses:
        '200':
          description: Moment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Moment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      summary: Delete a moment
      tags: [moments]
      parameters:
        - name: moment
          in: path
          required: true
          schema:
            type: integer
          description: ID of the moment to delete
      responses:
        '204':
          description: Moment deleted
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Moment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    MomentImageResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MomentImage'

    MomentResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Moment'

    MomentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Moment'
        links:
          type: object
          properties:
            first:
              type: string
              format: uri
              nullable: true
            last:
              type: string
              format: uri
              nullable: true
            prev:
              type: string
              format: uri
              nullable: true
            next:
              type: string
              format: uri
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            from:
              type: integer
              nullable: true
            last_page:
              type: integer
            path:
              type: string
              format: uri
            per_page:
              type: integer
            to:
              type: integer
              nullable: true
            total:
              type: integer

    Moment:
      type: object
      required: [id, body, body_html, created_at, images]
      properties:
        id:
          type: integer
        body:
          type: string
          nullable: true
          description: Raw Markdown text
        body_html:
          type: string
          nullable: true
          description: CommonMark-rendered HTML (unsafe HTML stripped, unsafe links blocked)
        created_at:
          type: string
          format: date-time
        images:
          type: array
          items:
            $ref: '#/components/schemas/MomentImage'

    MomentImage:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
          description: Signed Glide URL for the image

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
